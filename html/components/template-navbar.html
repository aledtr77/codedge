<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compressore e Convertitore di Immagini - Codedge</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/hexagon-c-logo-correct-svg.svg"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.1.1/compressor.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #2a2a2a;
        color: #f0f0f0;
        overflow-x: hidden;
      }

      header {
        position: sticky;
        top: 0;
        background-color: #2a2a2a;
        z-index: 1000;
        width: 100%;
      }

      /* Header e Navbar */
      .navbar-container {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        padding: 5px 20px;
        background-color: #2a2a2a;
      }

      h1 {
        margin: 0;
        font-size: 2em;
        white-space: nowrap;
        color: #007bff;
      }

      .nav-menu {
        display: flex;
        list-style-type: none;
        margin-left: auto;
        padding: 0;
      }

      .nav-item {
        margin-left: 25px;
      }

      .nav-link {
        color: #f0f0f0;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .nav-link i {
        margin-right: 0.4rem;
        /* Spazio tra l'icona e il testo */
      }

      .nav-link:hover {
        color: #007bff;
      }

      .menu-icon {
        display: none;
      }

      @media screen and (max-width: 1230px) {
        h1 {
          font-size: calc(1.2em + 0.8vw);
          /* Riduzione graduale del font size */
          white-space: normal;
          word-wrap: break-word;
        }
      }

      @media screen and (max-width: 768px) {
        body {
          font-size: 1em;
        }

        .navbar-container {
          flex-wrap: wrap;
          justify-content: space-between;
          position: relative;
        }

        h1 {
          max-width: calc(100% - 40px);
          /* Lascia spazio per l'icona del menu */
          order: 1;
          flex-basis: 100%;
          margin-bottom: 10px;
        }

        .menu-icon {
          display: flex;
          order: 2;
          flex-direction: column;
          justify-content: space-around;
          width: 30px;
          height: 25px;
          transition: transform 0.3s ease;
          margin-left: auto;
          /* Sposta l'icona a destra */
          background-color: transparent;
          border-radius: 3px;
        }

        .nav-menu {
          order: 3;
          display: none;
          position: absolute;
          top: 100%;
          right: 0;
          flex-direction: column;
          background-color: #2a2a2a;
          border-radius: 8px;
          width: 200px;
          padding: 10px;
          border: 1px solid;
          border-color: #3a3a3a #222222 #222222 #3a3a3a;
          box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.1),
            inset -1px -1px 0 rgba(0, 0, 0, 0.3), 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .nav-menu.active {
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          padding: 20px;
        }

        .nav-item {
          margin: 15px 0;
        }

        /* sezione menu toggle */
        .sidebar-toggle {
          display: flex;
          flex-direction: column;
          justify-content: space-around;
          margin-left: -6px;
          width: 30px;
          height: 25px;
          position: fixed;
          top: 56px;
          /* Aggiusta questa altezza in base all'altezza dell'header */
          left: 20px;
          z-index: 1002;
          background-color: transparent;
          border-radius: 3px;
        }

        .sidebar-toggle .bar,
        .menu-icon .bar {
          width: 100%;
          height: 3px;
          background-color: white;
          transition: all 0.3s;
        }

        /* Effetto hover */
        .sidebar-toggle:hover .bar,
        .menu-icon:hover .bar {
          background-color: #007bff;
          /* Cambia colore delle barre */
          transform: scale(1.1);
          /* Ingrandisce leggermente le barre */
        }

        .sidebar-toggle.active .bar:nth-child(1),
        .menu-icon.active .bar:nth-child(1) {
          transform: rotate(45deg) translate(5px, 5px);
        }

        .sidebar-toggle.active .bar:nth-child(2),
        .menu-icon.active .bar:nth-child(2) {
          opacity: 0;
        }

        .sidebar-toggle.active .bar:nth-child(3),
        .menu-icon.active .bar:nth-child(3) {
          transform: rotate(-45deg) translate(7.3px, -7.3px);
        }

        /* Media query per schermi ancora più piccoli */
        @media screen and (max-width: 480px) {
          h1 {
            font-size: 1.2em;
          }
        }
      }
    </style>
  </head>

  <body>
    <header>
      <nav class="navbar">
        <div class="navbar-container">
          <h1>
            <i class="fas fa-compress-arrows-alt"></i> Compressore e
            Convertitore di Immagini
          </h1>
          <div class="menu-icon">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </div>
          <ul class="nav-menu">
            <li class="nav-item">
              <a href="#" class="nav-link"><i class="fas fa-home"></i>Home</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link"
                ><i class="fas fa-tools"></i>Strumenti</a
              >
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link"
                ><i class="fas fa-project-diagram"></i>Progetti Pratici</a
              >
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link"
                ><i class="fas fa-book"></i>Risorse</a
              >
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link contacts-link"
                ><i class="fas fa-envelope"></i>Contatti</a
              >
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link"
                ><i class="fas fa-graduation-cap"></i>Percorsi di
                Apprendimento</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <script>
      const menuIcon = document.querySelector(".menu-icon");
      const navMenu = document.querySelector(".nav-menu");

      menuIcon.addEventListener("click", () => {
        menuIcon.classList.toggle("active");
        navMenu.classList.toggle("active");
      });
    </script>
  </body>
</html>
