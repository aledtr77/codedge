<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Box Shadow - Codehive</title>
    <link rel="alternate icon" href="../../assets/icons/icona-favicon.svg">

    <!-- moduli css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/components/main.css">
    <link rel="stylesheet" href="../../css/components/navbar.css">
    <link rel="stylesheet" href="../../css/components/button.css">
    <link rel="stylesheet" href="../../css/components/footer.css">

    <!-- moduli js -->
    <script src="../../js/components/navbar.js" defer></script>
    <script src="../../js/components/button.js" defer></script>
    <script src="../../js/components/footer.js"></script>


    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.2;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            background-color: var(--background-one);
        }

        .section {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .intro {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .generator-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
        }

        .controls {
            flex: 1;
            max-width: 450px;
            background: var(--background-two);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .preview {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .preview-box {
            width: 200px;
            height: 200px;
            background: var(--text-color);
            border-radius: 8px;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="range"] {
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .value-display {
            font-family: monospace;
            color: var(--color-three);
        }

        .code-output {
            background: var(--background-one);
            color: var(--text-color);
            padding: 1rem;
            border-radius: 4px;
            font-family: monospace;
            margin: 1rem;
        }

        .color-picker {
            margin-top: 0.5rem;
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px auto;
            width: 300px;
        }

        .color-controls {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .control-group {
            margin: 0 10px;
            text-align: center;
        }

        #outer-container {
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--text-color);
            border-radius: 8px;
        }

        #preview-box {
            width: 150px;
            height: 150px;
            background-color: var(--color-three);
            border-radius: 5px;
        }

        .color-preview {
            width: 20px;
            width: 20px;
            height: 20px;
            display: inline-block;
            margin-left: 10px;
            border: 1px solid var(--text-color);
        }

        #background-color,
        #object-color {
            max-width: 140px;
        }

        .tooltip-container {
            position: relative;
        }

        .tooltip {
            visibility: hidden;
            position: absolute;
            z-index: 1;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 6px;
            opacity: 0;
            background-color: var(--background-six);
            color: var(--text-color);
            text-align: center;
            border-radius: 6px;
            padding: 5px 10px;
            transition: opacity 0.3s, visibility 0.3s;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="navbar-container">
                <img src="../../assets/icons/codedge_logo.svg" alt="Logo codedge" class="logo" width="80" height="35" />
                <h1 class="resize-text"><i class="fas fa-adjust"></i> Generatore Box-Shadow</h1>

                <div class="menu-icon">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="../../html/home/index.html" class="nav-link"><i
                                class="fas fa-home"></i>Home</a></li>
                    <li class="nav-item"><a href="../../html/home/#risorse" class="nav-link"><i
                                class="fas fa-book"></i>Risorse</a></li>
                    <li class="nav-item"><a href="../../html/home/#strumenti" class="nav-link"><i
                                class="fas fa-tools"></i>Strumenti</a>
                    </li>
                    <li class="nav-item"><a href="../../html/home/#progetti-pratici" class="nav-link"><i
                                class="fas fa-project-diagram"></i>Progetti
                            Pratici</a></li>
                    <li class="nav-item"><a href="../../html/home/#percorsi-apprendimento" class="nav-link"><i
                                class="fas fa-graduation-cap"></i>Percorsi di
                            Apprendimento</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="section">

        <div class="generator-container">
            <div class="controls">
                <div class="control-group">
                    <label for="horizontal">Spostamento Orizzontale</label>
                    <input type="range" id="horizontal" min="-50" max="50" value="0">
                    <span class="value-display" id="horizontal-value">0px</span>
                </div>

                <div class="control-group">
                    <label for="vertical">Spostamento Verticale</label>
                    <input type="range" id="vertical" min="-50" max="50" value="0">
                    <span class="value-display" id="vertical-value">0px</span>
                </div>

                <div class="control-group">
                    <label for="blur">Sfocatura</label>
                    <input type="range" id="blur" min="0" max="100" value="0">
                    <span class="value-display" id="blur-value">0px</span>
                </div>

                <div class="control-group">
                    <label for="spread">Diffusione</label>
                    <input type="range" id="spread" min="-50" max="50" value="0">
                    <span class="value-display" id="spread-value">0px</span>
                </div>

                <div class="control-group">
                    <label for="color">Colore Ombra</label>
                    <input type="color" id="color" value="#000000" class="color-picker">
                    <input type="range" id="opacity" min="0" max="100" value="20">
                    <span class="value-display" id="opacity-value">20%</span>
                </div>

                <div class="code-output" id="css-code">
                    box-shadow: 0px 0px 0px 0px rgba(0,0,0,0.2);
                </div>

                <div class="tooltip-container">
                    <button class="button-simple" onclick="copyToClipboard(this)">Copia CSS</button>
                    <span class="tooltip">CSS copiato!</span>
                </div>
            </div>

            <div class="preview-container">
                <div class="color-controls">
                    <div class="control-group">
                        <label for="background-color">Colore sfondo:</label>
                        <input type="text" id="background-color" placeholder="#FFFFFF">

                    </div>
                    <div class="control-group">
                        <label for="object-color">Colore oggetto:</label>
                        <input type="text" id="object-color" placeholder="#3498DB">

                    </div>
                </div>
                <div id="outer-container">
                    <div id="preview-box"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const controls = {
            horizontal: document.getElementById('horizontal'),
            vertical: document.getElementById('vertical'),
            blur: document.getElementById('blur'),
            spread: document.getElementById('spread'),
            color: document.getElementById('color'),
            opacity: document.getElementById('opacity')
        };

        const preview = document.getElementById('preview-box');
        const cssCode = document.getElementById('css-code');

        function updateShadow() {
            const values = {
                horizontal: controls.horizontal.value,
                vertical: controls.vertical.value,
                blur: controls.blur.value,
                spread: controls.spread.value,
                color: controls.color.value,
                opacity: controls.opacity.value
            };

            // Aggiorna i display dei valori
            Object.keys(values).forEach(key => {
                if (key !== 'color') {
                    const display = document.getElementById(`${key}-value`);
                    display.textContent = key === 'opacity' ? `${values[key]}%` : `${values[key]}px`;
                }
            });

            // Converte il colore hex in RGB
            const hex = values.color.replace('#', '');
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);

            const shadowCSS = `${values.horizontal}px ${values.vertical}px ${values.blur}px ${values.spread}px rgba(${r},${g},${b},${values.opacity / 100})`;

            preview.style.boxShadow = shadowCSS;
            cssCode.textContent = `box-shadow: ${shadowCSS};`;
        }

        Object.values(controls).forEach(control => {
            control.addEventListener('input', updateShadow);
        });

        // funzione tooltip
        function copyToClipboard(element) {
            const cssText = cssCode.textContent;
            navigator.clipboard.writeText(cssText).then(() => {
                showTooltip(element.parentNode);
            });
        }

        function showTooltip(element) {
            const tooltip = element.querySelector('.tooltip');
            tooltip.style.visibility = 'visible';
            tooltip.style.opacity = '1';

            setTimeout(() => {
                tooltip.style.visibility = 'hidden';
                tooltip.style.opacity = '0';
            }, 2000);
        }

        // Inizializza l'anteprima
        updateShadow();

        const outerContainer = document.getElementById('outer-container');
        const previewBox = document.getElementById('preview-box');
        const backgroundColorInput = document.getElementById('background-color');
        const objectColorInput = document.getElementById('object-color');
        const backgroundColorPreview = document.getElementById('background-color-preview');
        const objectColorPreview = document.getElementById('object-color-preview');

        function updateColors() {
            const backgroundColor = backgroundColorInput.value;
            const objectColor = objectColorInput.value;

            if (isValidColor(backgroundColor)) {
                outerContainer.style.backgroundColor = backgroundColor;
                backgroundColorPreview.style.backgroundColor = backgroundColor;
            }

            if (isValidColor(objectColor)) {
                previewBox.style.backgroundColor = objectColor;
                objectColorPreview.style.backgroundColor = objectColor;
            }
        }

        function isValidColor(color) {
            return /^#[0-9A-F]{6}$/i.test(color);
        }

        backgroundColorInput.addEventListener('input', updateColors);
        objectColorInput.addEventListener('input', updateColors);

    </script>
</body>

</html>
