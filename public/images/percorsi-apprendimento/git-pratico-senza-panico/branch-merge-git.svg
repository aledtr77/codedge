<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Gitgraph branch e merge</title>
  <desc id="desc">Visualizzazione gitgraph con branch feature che viene mergiato su main.</desc>

  <rect width="1200" height="500" fill="#102b46" rx="0"/>

  <text x="56" y="60" fill="#e9f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Branch e merge (gitgraph)</text>
  <text x="56" y="88" fill="#a9cae5" font-family="Segoe UI, Arial, sans-serif" font-size="17">Linea principale + ramo feature con merge commit</text>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 300 H1080" stroke="#79c0f2" stroke-width="6"/>
    <path d="M330 300 C370 240, 455 210, 560 220 C590 225, 608 252, 620 300" stroke="#7de0af" stroke-width="6"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="82" y="306" fill="#d8f1ff" font-size="20" font-weight="700">main</text>
    <text x="418" y="184" fill="#c8f4de" font-size="18" font-weight="700">feature/navbar-mobile</text>

    <circle cx="200" cy="300" r="11" fill="#63b4ec"/>
    <circle cx="330" cy="300" r="11" fill="#63b4ec"/>
    <circle cx="780" cy="300" r="11" fill="#63b4ec"/>
    <circle cx="930" cy="300" r="11" fill="#63b4ec"/>

    <circle cx="420" cy="250" r="10" fill="#78e6b5"/>
    <circle cx="500" cy="220" r="10" fill="#78e6b5"/>
    <circle cx="560" cy="220" r="10" fill="#78e6b5"/>

    <circle cx="620" cy="300" r="14" fill="#8ad0ff"/>
    <circle cx="620" cy="300" r="7" fill="#102b46"/>

    <text x="186" y="331" fill="#b9d9ef" font-size="14">A</text>
    <text x="316" y="331" fill="#b9d9ef" font-size="14">B</text>
    <text x="407" y="272" fill="#bdebd2" font-size="13">f1</text>
    <text x="487" y="242" fill="#bdebd2" font-size="13">f2</text>
    <text x="548" y="242" fill="#bdebd2" font-size="13">f3</text>
    <text x="610" y="330" fill="#d5ecff" font-size="14">M</text>
    <text x="767" y="331" fill="#b9d9ef" font-size="14">C</text>
    <text x="918" y="331" fill="#b9d9ef" font-size="14">D</text>
  </g>

  <rect x="74" y="370" width="1052" height="68" rx="0" fill="#153a59" stroke="#66b2e7"/>
  <text x="94" y="411" fill="#def3ff" font-family="Segoe UI, Arial, sans-serif" font-size="21">main: A -> B -> M -> C -> D   |   feature: B -> f1 -> f2 -> f3 -> M</text>
</svg>
