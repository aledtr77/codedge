<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Deploy base spiegato in modo semplice</title>
  <desc id="desc">Tre passaggi chiari: aggiorni il progetto, la piattaforma prepara i file finali, il sito viene pubblicato online.</desc>
  <rect width="1200" height="500" rx="28" fill="#0B1420"/>
  <rect x="24" y="24" width="1152" height="452" rx="24" fill="url(#bg)"/>

  <text x="56" y="74" fill="#EEF8FF" font-family="Arial, sans-serif" font-size="34" font-weight="700">Deploy base, spiegato semplice</text>
  <text x="56" y="108" fill="#C7DFF1" font-family="Arial, sans-serif" font-size="18">Idea da tenere a mente: aggiorni il progetto, la piattaforma prepara i file finali, il sito viene messo online.</text>

  <g>
    <rect x="74" y="166" width="276" height="170" rx="24" fill="#14283C" stroke="#66C1FF" stroke-opacity=".45"/>
    <text x="104" y="210" fill="#F4FAFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">1. Tu aggiorni</text>
    <text x="104" y="246" fill="#F4FAFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">il progetto</text>
    <text x="104" y="286" fill="#D6EAFB" font-family="Arial, sans-serif" font-size="20">Modifichi i file</text>
    <text x="104" y="316" fill="#D6EAFB" font-family="Arial, sans-serif" font-size="20">e fai push</text>
  </g>

  <g>
    <rect x="462" y="166" width="276" height="170" rx="24" fill="#123137" stroke="#63D7BE" stroke-opacity=".45"/>
    <text x="492" y="210" fill="#F4FAFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">2. La piattaforma</text>
    <text x="492" y="246" fill="#F4FAFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">prepara il sito</text>
    <text x="492" y="286" fill="#D6F3EE" font-family="Arial, sans-serif" font-size="20">Fa la build</text>
    <text x="492" y="316" fill="#D6F3EE" font-family="Arial, sans-serif" font-size="20">e crea i file finali</text>
  </g>

  <g>
    <rect x="850" y="166" width="276" height="170" rx="24" fill="#2A2740" stroke="#FFB65C" stroke-opacity=".45"/>
    <text x="880" y="210" fill="#FFF8EF" font-family="Arial, sans-serif" font-size="30" font-weight="700">3. Il sito</text>
    <text x="880" y="246" fill="#FFF8EF" font-family="Arial, sans-serif" font-size="30" font-weight="700">va online</text>
    <text x="880" y="286" fill="#FDE6C1" font-family="Arial, sans-serif" font-size="20">Ricevi un URL</text>
    <text x="880" y="316" fill="#FDE6C1" font-family="Arial, sans-serif" font-size="20">e controlli che funzioni</text>
  </g>

  <path d="M350 251H430" stroke="#66C1FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M738 251H818" stroke="#63D7BE" stroke-width="6" stroke-linecap="round"/>

  <g>
    <rect x="110" y="376" width="980" height="78" rx="18" fill="rgba(7,14,24,.52)" stroke="rgba(255,255,255,.12)"/>
    <text x="140" y="423" fill="#DCECF9" font-family="Arial, sans-serif" font-size="21">Se la configurazione è corretta, dopo il push gran parte del lavoro viene gestita automaticamente.</text>
  </g>

  <defs>
    <linearGradient id="bg" x1="40" y1="36" x2="1148" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13283C"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
  </defs>
</svg>
