<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Workflow quotidiano in Visual Studio Code</title>
  <desc id="desc">Schema orizzontale del flusso: apri progetto, navighi, modifichi, lanci il terminale, debbughi e fai commit.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1726"/>
      <stop offset="100%" stop-color="#0f2437"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" rx="28" fill="url(#bg2)"/>
  <text x="70" y="78" fill="#eef9ff" font-size="34" font-family="Arial, sans-serif" font-weight="700">Routine pratica in VS Code</text>
  <text x="70" y="112" fill="#9bd8ff" font-size="18" font-family="Arial, sans-serif">Dal progetto aperto al commit finale, senza cambiare continuamente contesto</text>

  <g font-family="Arial, sans-serif">
    <g transform="translate(46 176)">
      <rect width="166" height="128" rx="18" fill="#102b41" stroke="#55c3ff" stroke-opacity="0.5"/>
      <text x="20" y="42" fill="#eff9ff" font-size="22" font-weight="700">1. Apri</text>
      <text x="20" y="72" fill="#d4f0ff" font-size="14">
        <tspan x="20" dy="0">cartella progetto</tspan>
        <tspan x="20" dy="20">e file giusti</tspan>
      </text>
    </g>
    <g transform="translate(228 176)">
      <rect width="166" height="128" rx="18" fill="#102b41" stroke="#55c3ff" stroke-opacity="0.5"/>
      <text x="20" y="42" fill="#eff9ff" font-size="22" font-weight="700">2. Naviga</text>
      <text x="20" y="72" fill="#d4f0ff" font-size="14">
        <tspan x="20" dy="0">Explorer, tabs</tspan>
        <tspan x="20" dy="20">e Quick Open</tspan>
      </text>
    </g>
    <g transform="translate(410 176)">
      <rect width="166" height="128" rx="18" fill="#102b41" stroke="#82ddaa" stroke-opacity="0.5"/>
      <text x="20" y="42" fill="#eff9ff" font-size="22" font-weight="700">3. Modifica</text>
      <text x="20" y="72" fill="#dbfff0" font-size="14">
        <tspan x="20" dy="0">ricerca globale</tspan>
        <tspan x="20" dy="20">e multi-cursor</tspan>
      </text>
    </g>
    <g transform="translate(592 176)">
      <rect width="166" height="128" rx="18" fill="#102b41" stroke="#82ddaa" stroke-opacity="0.5"/>
      <text x="20" y="42" fill="#eff9ff" font-size="22" font-weight="700">4. Lancia</text>
      <text x="20" y="72" fill="#dbfff0" font-size="14">
        <tspan x="20" dy="0">terminale, task</tspan>
        <tspan x="20" dy="20">e script utili</tspan>
      </text>
    </g>
    <g transform="translate(774 176)">
      <rect width="166" height="128" rx="18" fill="#102b41" stroke="#ffd07d" stroke-opacity="0.5"/>
      <text x="20" y="42" fill="#eff9ff" font-size="22" font-weight="700">5. Controlla</text>
      <text x="20" y="72" fill="#fff3d8" font-size="14">
        <tspan x="20" dy="0">Problems panel</tspan>
        <tspan x="20" dy="20">e debug</tspan>
      </text>
    </g>
    <g transform="translate(956 176)">
      <rect width="166" height="128" rx="18" fill="#102b41" stroke="#a8d8ff" stroke-opacity="0.5"/>
      <text x="20" y="42" fill="#eff9ff" font-size="22" font-weight="700">6. Commit</text>
      <text x="20" y="72" fill="#d9efff" font-size="14">
        <tspan x="20" dy="0">rileggi diff</tspan>
        <tspan x="20" dy="20">e stato Git</tspan>
      </text>
    </g>
  </g>

  <g stroke="#72d0ff" stroke-width="3" stroke-linecap="round">
    <path d="M212 240 H228"/>
    <path d="M394 240 H410"/>
    <path d="M576 240 H592"/>
    <path d="M758 240 H774"/>
    <path d="M940 240 H956"/>
  </g>

  <g fill="#72d0ff">
    <circle cx="220" cy="240" r="4"/>
    <circle cx="402" cy="240" r="4"/>
    <circle cx="584" cy="240" r="4"/>
    <circle cx="766" cy="240" r="4"/>
    <circle cx="948" cy="240" r="4"/>
  </g>

  <text x="70" y="390" fill="#d9efff" font-size="18" font-family="Arial, sans-serif">Idea chiave: l’editor funziona meglio quando ogni pannello ha uno scopo preciso e non diventa rumore costante.</text>
</svg>
